services:
  # Chroma vector database - separate container
  chromadb:
    image: chromadb/chroma:latest
    container_name: omarchy-chroma
    volumes:
      - chroma_data:/data
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - omarchy-network

  # MCP server - Python app
  mcp-server:
    build:
      context: .
      # Build the container's non-root user with the host user's UID/GID so
      # files written into the ./data bind mount (processed docs, downloads)
      # stay owned by the host user instead of root. Without this, host-side
      # cleanup in upgrade.sh / setup.sh fails with "Permission denied".
      # Override DOCKER_UID/DOCKER_GID if your host user isn't 1000:1000.
      args:
        UID: "${DOCKER_UID:-1000}"
        GID: "${DOCKER_GID:-1000}"
    container_name: omarchy-mcp-server
    depends_on:
      - chromadb
    volumes:
      - ./data:/app/data
      - ./mcp_server:/app/mcp_server
      - ./scripts:/app/scripts
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    networks:
      - omarchy-network
    stdin_open: true
    tty: true

networks:
  omarchy-network:
    driver: bridge

volumes:
  chroma_data:
